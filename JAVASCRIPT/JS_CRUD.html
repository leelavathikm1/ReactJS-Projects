<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User CRUD Management</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
      }

      .form-section {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #667eea;
        color: white;
        width: 100%;
      }

      .btn-primary:hover {
        background: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-edit {
        background: #48bb78;
        color: white;
        padding: 5px 10px;
        font-size: 12px;
      }

      .btn-edit:hover {
        background: #38a169;
      }

      .btn-delete {
        background: #f56565;
        color: white;
        padding: 5px 10px;
        font-size: 12px;
      }

      .btn-delete:hover {
        background: #e53e3e;
      }

      .btn-reset {
        background: #a0aec0;
        color: white;
        width: 100%;
      }

      .btn-reset:hover {
        background: #718096;
      }

      .users-section {
        margin-top: 30px;
      }

      .users-section h2 {
        color: #333;
        margin-bottom: 20px;
      }

      .user-card {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid #667eea;
      }

      .user-info {
        flex: 1;
      }

      .user-info p {
        margin: 5px 0;
        color: #555;
      }

      .user-info strong {
        color: #333;
      }

      .user-actions {
        display: flex;
        gap: 10px;
      }

      .empty-message {
        text-align: center;
        color: #999;
        padding: 30px;
      }

      .success-message {
        background: #c6f6d5;
        color: #22543d;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        display: none;
      }

      @media (max-width: 600px) {
        .form-row {
          grid-template-columns: 1fr;
        }

        .user-card {
          flex-direction: column;
          align-items: flex-start;
        }

        .user-actions {
          margin-top: 10px;
          width: 100%;
        }

        button {
          flex: 1;
        }
      }
      table {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 User Management System</h1>

      <div class="success-message" id="successMessage"></div>

      <div class="form-section">
        <form id="userForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                placeholder="Enter first name"
                required
              />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                placeholder="Enter last name"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" />
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter city" />
          </div>

          <div class="form-row">
            <button type="button" class="btn-primary" onclick="addUser()">
              Add User
            </button>
            <button type="reset" class="btn-reset">Clear Form</button>
          </div>
        </form>
        <table border="1">
          <thead>
            <tr>
              <th>Email</th>
              <th>Phone</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>City</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="users-section">
        <h2>👥 All Users</h2>
        <div id="usersList">
          <div class="empty-message">
            No users added yet. Add a user to get started!
          </div>
        </div>
      </div>
    </div>
    <script>
      const url = "http://localhost:3000/users/";

      async function addUser() {
        const user = {
          firstName: document.getElementById("firstName").value,
          lastName: document.getElementById("lastName").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          city: document.getElementById("city").value,
        };

        try {
          const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(user),
            headers: {
              "Content-Type": "Application/json",
            },
          });
          const results = await response.json();
          getUsers();
        } catch (error) {
          console.log("Something went wrong !!!!");
        }
      }
      let allUsers = [];
      async function getUsers() {
        try {
          const response = await fetch(url);
          const results = await response.json();
          console.log(results);
          allUsers = results;
          results.forEach((user) => {
            var myTr = document.createElement("tr");
            console.log(user);
            // for (a in user) {
            //   var mytd = document.createElement("td");
            //   mytd.innerHTML = user[a];
            //   myTr.append(mytd);
            // }
            myTr.innerHTML = `
            <td>${user.email}</td>
            <td>${user.phone}</td>
            <td>${user.firstName}</td>
            <td>${user.lastName}</td>
           
           
            <td>${user.city}</td>
            <td><button onclick="handleEdit(${user.id})">Edit</button></td>
            <td><button onclick="handleDeleteUser(${user.id})">Delete</button></td>`;
            document.querySelector("tbody").append(myTr);
          });
        } catch (error) {
          console.log(error);
        }
      }

      async function handleDeleteUser(id) {
        console.log(id);
        try {
          const response = await fetch(url + id, {
            method: "DELETE",
          });
          const results = await response.json();
          getUsers();
        } catch (error) {
          console.log(error);
        }
      }

      function handleEdit(id) {
        console.log(id);
        console.log(allUsers);
        const userTOEdit = allUsers.find((usr) => id == usr.id);
        console.log(userTOEdit);
      }
      getUsers();
    </script>
  </body>
</html>
